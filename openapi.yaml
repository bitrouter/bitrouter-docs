  /v1/namespaces/{nsid}/presets:
    get:
      tags:
      - Management
      summary: List the account's preset bundles
      description: |-
        Typed list of `kind = 'preset'` rows. Each preset carries optional `guardrail`, `budget`, and `rate_limit` clauses.

        _Requires the `policy:read` scope._
      operationId: listPresets
      parameters:
      - in: path
        name: nsid
        description: Id of the target namespace. Must be owned by the caller (or equal a namespace-baked credential's own namespace), else 404.
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          description: Preset list.
          content:
            application/json:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: PresetListResponse
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/$defs/PresetEnvelope'
                required:
                - data
                $defs:
                  Action:
                    description: What to do when a rule matches.
                    oneOf:
                    - description: |-
                        Block the content â€” upstream this is a 400 deny, downstream a stream
                        abort. The default when a rule omits its action (block is the safe one).
                      type: string
                      const: block
                    - description: Redact the matched span â€” replace it with the redaction placeholder.
                      type: string
                      const: redact
                  BudgetSpec:
                    description: |-
                      A spend cap over a rolling window. Spend is measured in
                      micro-USD â€” the same unit the credit ledger uses, so engine code
                      can sum `credit_ledger_entries.amount_micro_usd` directly.
                    type: object
                    properties:
                      limit_micro_usd:
                        description: |-
                          Spend cap in micro-USD. Must be positive; a non-positive cap
                          would deny every request and is treated as "no policy" by the
                          engine (it's clamped out during validation in a later phase
                          when CRUD lands).
                        type: integer
                        format: int64
                      window:
                        $ref: '#/$defs/BudgetWindow'
                    required:
                    - window
                    - limit_micro_usd
                  BudgetWindow:
                    description: |-
                      A rolling spend window for [`BudgetSpec`]. Maps to a SQL
                      time-bucket query against `credit_ledger_entries`.
                    oneOf:
                    - description: 24 hours rolling.
                      type: string
                      const: day
                    - description: 30 days rolling.
                      type: string
                      const: month
                    - description: Lifetime â€” accumulates indefinitely.
                      type: string
                      const: total
                  ByokRequirement:
                    description: |-
                      Strictness requirement on bring-your-own-key usage for the
                      inference call. Mapped from the caller's per-provider BYOK key.
                    oneOf:
                    - description: |-
                        The request MUST be served via a BYOK provider key. Used by
                        teams who never want platform credits to be spent.
                      type: string
                      const: required
                    - description: |-
                        The request MUST NOT be served via a BYOK key. Useful for
                        suppressing accidental BYOK shadowing on shared namespaces.
                      type: string
                      const: forbidden
                    - description: Either path is acceptable. Equivalent to no constraint.
                      type: string
                      const: optional
                  GuardrailSpec:
                    description: |-
                      Per-request constraints on the inference call (model allowlists,
                      max generation length, streaming / BYOK switches). Each field is
                      optional; an unset axis adds no constraint.
                    type: object
                    properties:
                      allow_streaming:
                        description: |-
                          Permit-only one-way gate on streaming responses.
                          `Some(false)` forbids streaming: a request with `stream: true`
                          is denied. `Some(true)` and `None` both permit streaming
                          (`Some(true)` is the explicit "no constraint here" form;
                          `None` is the absence of any opinion). Guardrails cannot
                          *require* streaming â€” there is no way to refuse a
                          `stream: false` request via this field. The combiner
                          ([`crate::policy::engine`]) is forbid-wins for the same
                          reason: the union of permits is still a permit, and any one
                          `Some(false)` makes the effective policy a forbid.
                        type:
                        - boolean
                        - 'null'
                      byok:
                        description: |-
                          BYOK posture (see [`ByokRequirement`]). `None` = no
                          constraint.
                        anyOf:
                        - $ref: '#/$defs/ByokRequirement'
                        - type: 'null'
                      content_patterns:
                        description: |-
                          Content-firewall rules: regex `block` / `redact` patterns run over
                          the request prompt and the response stream by the
                          `bitrouter-guardrails` hooks. Empty = no content filtering. Combined
                          as a union across policies (every rule from every applicable policy
                          applies â€” more rules is strictly more restrictive).
                        type: array
                        items:
                          $ref: '#/$defs/RuleSpec'
                      max_request_tokens:
                        description: |-
                          Hard cap on the request's `prompt.params.max_tokens`. When
                          the request leaves `max_tokens` unset, the call is admitted â€”
                          the engine can't enforce a cap on an undeclared value.
                        type:
                        - integer
                        - 'null'
                        format: int64
                      model_allow:
                        description: |-
                          If set, only these (canonical) model ids may be requested.
                          An empty allowlist denies every model â€” same as no policy.
                        type:
                        - array
                        - 'null'
                        items:
                          type: string
                      model_deny:
                        description: |-
                          If set, these model ids are explicitly refused even when the
                          allowlist would otherwise admit them. Deny wins over allow.
                        type:
                        - array
                        - 'null'
                        items:
                          type: string
                  PresetEnvelope:
                    description: |-
                      One preset as it appears on the wire. The sub-policy fields are
                      optional so an empty preset (no clauses) is representable; the
                      engine ignores empty presets at request time so this is a no-op
                      row rather than a denial.
                    type: object
                    properties:
                      budget:
                        anyOf:
                        - $ref: '#/$defs/BudgetSpec'
                        - type: 'null'
                      disabled_at:
                        description: |-
                          `None` for enabled rows. See
                          [`crate::v1::http::management::policies::PolicyEnvelope::disabled_at`]
                          for semantics â€” toggle via `POST /v1/policies/{id}/disable`
                          / `/enable`.
                        type:
                        - string
                        - 'null'
                        format: date-time
                      guardrail:
                        anyOf:
                        - $ref: '#/$defs/GuardrailSpec'
                        - type: 'null'
                      id:
                        type: string
                      name:
                        type: string
                      rate_limit:
                        anyOf:
                        - $ref: '#/$defs/RateLimitSpec'
                        - type: 'null'
                    required:
                    - id
                    - name
                  RateLimitSpec:
                    description: |-
                      A request-frequency cap over a sliding window. Enforced with
                      Redis counters keyed per principal + window. At least one of
                      `max_requests` / `max_tokens` must be set for the policy to bite.
                    type: object
                    properties:
                      max_requests:
                        description: Hard cap on completed (admitted) requests in the window.
                        type:
                        - integer
                        - 'null'
                        format: int64
                      max_tokens:
                        description: |-
                          Hard cap on the caller's declared prompt-token budget
                          (`prompt.params.max_tokens`) in the window. Optional â€” most
                          rate-limit policies in practice only cap request rate.
                        type:
                        - integer
                        - 'null'
                        format: int64
                      window_secs:
                        description: Sliding-window width in seconds. Must be positive.
                        type: integer
                        format: int64
                    required:
                    - window_secs
                  RuleSpec:
                    description: |-
                      One guardrail rule in serializable form: a name, a regex pattern, and a
                      match action. Compile it into a runtime rule with `RuleSpec::compile`.
                    type: object
                    properties:
                      action:
                        description: What to do on a match. Defaults to `block` when omitted.
                        $ref: '#/$defs/Action'
                        default: block
