                    <https://platform.openai.com/docs/api-reference/responses/create#responses-create-tools>
                  type: object
                  properties:
                    description:
                      type:
                      - string
                      - 'null'
                      default: null
                    name:
                      type:
                      - string
                      - 'null'
                      default: null
                    parameters:
                      default: null
                    strict:
                      description: |-
                        OpenAI strict-mode flag (V3 `strict`) on a function tool. Captured so it
                        is not lost across the canonical boundary.
                      type:
                      - boolean
                      - 'null'
                      default: null
                    type:
                      type:
                      - string
                      - 'null'
                      default: null
        required: true
      responses:
        '200':
          description: |-
