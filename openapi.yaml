                  type: array
                  items:
                    $ref: '#/$defs/ResponsesTool'
                top_p:
                  type:
                  - number
                  - 'null'
                  format: double
                  default: null
              required:
              - input
              $defs:
                ResponsesReasoningConfig:
                  description: |-
                    `reasoning` knob on [`ResponsesRequest`] â€” only `effort` is read; other
                    fields (`summary`, â€¦) round-trip via no slot today (matching v0 behavior).
                  type: object
                  properties:
                    effort:
                      type:
                      - string
                      - 'null'
                      default: null
                ResponsesText:
                  description: |-
                    Responses `text` config. `format` constrains output shape; sibling keys
                    (e.g. `verbosity`) pass through via `extra`.
                  type: object
                  properties:
                    format:
                      anyOf:
                      - $ref: '#/$defs/ResponsesTextFormat'
                      - type: 'null'
                      default: null
                ResponsesTextFormat:
                  description: |-
                    Responses `text.format`
                    (<https://platform.openai.com/docs/api-reference/responses/create>) â€” a
                    closed union over OpenAI's three output modes.
                  oneOf:
                  - description: Free-form text â€” the default.
                    type: object
                    properties:
                      type:
                        type: string
                        const: text
                    required:
                    - type
                  - description: Legacy JSON mode.
                    type: object
                    properties:
                      type:
                        type: string
                        const: json_object
                    required:
                    - type
                  - description: JSON constrained to a schema.
                    type: object
                    properties:
                      description:
                        description: |-
                          Optional schema description â€” extra LLM guidance OpenAI passes to the
                          model. Promoted to the canonical `response_format` description.
                          <https://platform.openai.com/docs/api-reference/responses/create>
                        type:
                        - string
                        - 'null'
                      name:
                        description: Schema name (OpenAI requires it).
                        type: string
                      schema:
                        description: The JSON Schema.
                      strict:
                        description: Strict-mode flag.
                        type:
                        - boolean
                        - 'null'
                      type:
                        type: string
                        const: json_schema
                    required:
