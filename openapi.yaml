                  description: Replace the budget clause. `None` â‡’ unchanged.
                  anyOf:
                  - $ref: '#/$defs/BudgetSpec'
                  - type: 'null'
                  default: null
                clear_budget:
                  type: boolean
                  default: false
                clear_guardrail:
                  description: |-
                    When true, drop the guardrail clause from the stored preset.
                    Overrides `guardrail` if both are present (the spec body
                    would have to be re-set on a subsequent PUT to add it back).
                  type: boolean
                  default: false
                clear_rate_limit:
                  type: boolean
                  default: false
                guardrail:
                  description: Replace the guardrail clause. `None` â‡’ unchanged.
                  anyOf:
                  - $ref: '#/$defs/GuardrailSpec'
                  - type: 'null'
                  default: null
                name:
                  description: New name. `None` â‡’ unchanged.
                  type:
                  - string
                  - 'null'
                  default: null
                rate_limit:
                  description: Replace the rate-limit clause. `None` â‡’ unchanged.
                  anyOf:
                  - $ref: '#/$defs/RateLimitSpec'
                  - type: 'null'
                  default: null
