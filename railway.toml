# Railway service config for the BitRouter marketing/docs site (bitrouter-docs).
#
# In the Railway dashboard for this service:
#   • Settings -> Source -> Root Directory: (empty / repo root).
#   • Settings -> Config-as-code -> Railway Config File: railway.toml.
#   • Domain: bitrouter.ai.
#   • Variables: NEXT_PUBLIC_WEB_URL / NEXT_PUBLIC_CONSOLE_URL (see .env.example).
#     The OpenAPI reference MDX is regenerated by the `prebuild` step at build
#     time from the committed openapi.yaml.

[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm build"

[deploy]
startCommand = "pnpm start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
