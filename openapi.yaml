                  description: |-
                    Deterministic-sampling seed. Promoted to the canonical `seed` slot so it
                    translates across protocols (e.g. to a Gemini upstream's
                    `generationConfig.seed`) instead of no-op'ing as a top-level key on a
                    nested-config wire.
