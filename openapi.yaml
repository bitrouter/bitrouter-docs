      summary: Create message
      description: |-
        Creates a message using the Anthropic Messages API format. Drop-in replacement for the Anthropic API.

        When `stream: true`, the response is sent as Server-Sent Events (SSE). Each event has a `type` field indicating the event kind (`message_start`, `content_block_delta`, `message_delta`, `message_stop`).
      operationId: createMessage
      requestBody:
        description: Anthropic Messages request.
        content:
          application/json:
            schema:
              $schema: https://json-schema.org/draft/2020-12/schema
              title: MessagesRequest
              description: |-
                Messages request body (<https://docs.anthropic.com/en/api/messages>).

                `pub` so downstream crates (notably `bitrouter-cloud`) can derive an
                OpenAPI schema from the canonical wire shape without redeclaring it.
              type: object
              properties:
                max_tokens:
                  type:
                  - integer
                  - 'null'
                  format: uint32
                  default: null
                  minimum: 0
                messages:
                  type: array
                  items:
                    $ref: '#/$defs/MessagesMessage'
                model:
                  type: string
                output_config:
                  description: |-
                    Structured-output + reasoning config â€” `format` (`json_schema`) is
                    promoted to the canonical `response_format` and `effort` to the canonical
                    reasoning effort. Sibling keys pass through via `extra`.
                    <https://platform.claude.com/docs/en/build-with-claude/structured-outputs>
                  anyOf:
                  - $ref: '#/$defs/MessagesOutputConfig'
                  - type: 'null'
                stop_sequences:
                  description: |-
                    Custom stop sequences. Promoted to the canonical `stop` slot, so it can
                    render as a Chat Completions `stop` or a Gemini `stopSequences`.
                    <https://docs.anthropic.com/en/api/messages#body-stop-sequences>
                  type:
                  - array
                  - 'null'
                  default: null
                  items:
                    type: string
                stream:
                  type: boolean
                  default: false
                system:
                  description: 'String or an array of `{type:"text", text}` blocks (#227 â†’ #228).'
                  default: null
                temperature:
                  type:
                  - number
                  - 'null'
                  format: double
                  default: null
                tools:
                  type: array
                  items:
                    $ref: '#/$defs/MessagesTool'
                top_k:
                  description: |-
                    Top-k sampling. Promoted to the canonical `top_k` slot so it translates
                    across protocols (e.g. to a Gemini upstream's `generationConfig.topK`).
                    <https://docs.anthropic.com/en/api/messages#body-top-k>
                  type:
                  - integer
                  - 'null'
                  format: uint32
                  default: null
                  minimum: 0
                top_p:
                  type:
                  - number
                  - 'null'
                  format: double
                  default: null
              required:
              - model
              - messages
              $defs:
                MessagesMessage:
                  description: One element of [`MessagesRequest`]'s `messages` array â€” a `{ role, content }` turn.
                  type: object
                  properties:
                    content:
                      description: String or an array of content blocks.
                    role:
                      type: string
                  required:
                  - role
                  - content
                MessagesOutputConfig:
                  description: Messages `output_config` â€” structured output + reasoning effort.
                  type: object
                  properties:
                    effort:
                      description: Reasoning effort (`low` | `medium` | `high` | `xhigh` | `max`).
                      type:
                      - string
                      - 'null'
                      default: null
                    format:
                      anyOf:
                      - $ref: '#/$defs/MessagesOutputFormat'
                      - type: 'null'
                MessagesOutputFormat:
                  description: |-
                    Messages `output_config.format`
                    (<https://platform.claude.com/docs/en/build-with-claude/structured-outputs>).
                    Anthropic's GA structured-output format carries no name / strict.
                  oneOf:
                  - description: JSON constrained to a schema.
                    type: object
                    properties:
                      schema:
                        description: The JSON Schema.
                      type:
                        type: string
                        const: json_schema
                    required:
                    - type
                    - schema
                MessagesTool:
                  description: |-
                    One element of [`MessagesRequest`]'s `tools` array.

                    Anthropic uses one array for both kinds of tool:
                    - a **client (function) tool** â€” `{name, description?, input_schema}` (no `type`);
                    - a **provider-defined (server) tool** â€” `{type:"web_search_20250305"|â€¦, name, â€¦config}`
                      (web search, code execution, computer use, bash, text editor), where `type`
                      is the dated tool version and `name` is the stable tool name.

                    A versioned `type` discriminates a server tool; its config keys ride in
                    `extra` so they are preserved verbatim into `Tool::ProviderDefined.args`.
                    <https://docs.claude.com/en/docs/agents-and-tools/tool-use/overview>
                    <https://docs.claude.com/en/docs/agents-and-tools/tool-use/web-search-tool>
                  type: object
                  properties:
                    description:
                      type:
                      - string
                      - 'null'
                      default: null
                    input_schema:
                      default: null
                    name:
                      type:
                      - string
                      - 'null'
                      default: null
                    type:
                      type:
                      - string
                      - 'null'
                      default: null
        required: true
      responses:
        '200':
          description: |-
            Messages response (non-streaming).

            Streamed Messages response â€” Server-Sent Events. Each event has a `type` field (`message_start`, `content_block_delta`, â€¦).
          content:
            application/json:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: MessagesResponseDoc
                description: 'MIRROR: `bitrouter_sdk::language_model::protocol::messages` response'
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/$defs/MessagesContentBlockDoc'
                  id:
                    type: string
                  model:
                    type: string
                  role:
                    description: Always `assistant`.
                    type: string
                  stop_reason:
                    type:
                    - string
                    - 'null'
                  stop_sequence:
                    type:
                    - string
                    - 'null'
                  type:
                    description: Always `message`.
                    type: string
                  usage:
                    $ref: '#/$defs/MessagesUsageDoc'
                required:
                - id
                - type
                - role
                - content
                - model
                - usage
                $defs:
                  MessagesContentBlockDoc:
                    type: object
                    properties:
                      text:
                        type: string
                      type:
                        description: Block type â€” `text` is the only variant emitted today.
                        type: string
                    required:
                    - type
                    - text
                  MessagesUsageDoc:
                    type: object
                    properties:
                      cache_creation_input_tokens:
                        description: |-
                          Number of tokens written to the prompt cache by this request. Present
                          (non-zero) only when the request enabled prompt caching.
                        type:
                        - integer
                        - 'null'
                        format: uint32
                        minimum: 0
                      cache_read_input_tokens:
                        description: |-
                          Number of tokens read from the prompt cache by this request. Present
                          (non-zero) only when the request reused a cached prompt.
                        type:
                        - integer
                        - 'null'
                        format: uint32
                        minimum: 0
                      input_tokens:
                        type: integer
                        format: uint32
                        minimum: 0
                      output_tokens:
                        type: integer
                        format: uint32
                        minimum: 0
                    required:
                    - input_tokens
                    - output_tokens
            text/event-stream:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: MessagesStreamEventDoc
                description: 'MIRROR: a single SSE event in the streaming `/v1/messages` response.'
                type: object
                properties:
                  delta:
                    anyOf:
                    - $ref: '#/$defs/MessagesStreamDeltaDoc'
                    - type: 'null'
                  index:
                    type:
                    - integer
                    - 'null'
                    format: uint32
                    minimum: 0
                  message:
                    anyOf:
                    - $ref: '#/$defs/MessagesStreamMessageDoc'
                    - type: 'null'
                  type:
                    description: |-
                      Event type â€” `message_start`, `content_block_delta`, `message_delta`,
                      `message_stop`, etc.
                    type: string
                required:
                - type
                $defs:
                  MessagesStreamDeltaDoc:
                    type: object
                    properties:
                      stop_reason:
                        type:
                        - string
                        - 'null'
                      text:
                        type:
                        - string
                        - 'null'
                      type:
                        type:
                        - string
                        - 'null'
                  MessagesStreamMessageDoc:
                    type: object
                    properties:
                      id:
                        type: string
                      model:
                        type: string
                      role:
                        type: string
                    required:
                    - id
                    - model
                    - role
        '400':
          description: Bad request â€” invalid model or malformed request body.
          content:
            application/json:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: ErrorResponseDoc
                description: |-
                  MIRROR: the JSON shape `bitrouter_sdk::error::BitrouterError` serialises into
                  (`{ "error": { "code": ..., "message": ... } }`). Cloud handlers map to
                  this envelope via `BitrouterError::into_response`.
                type: object
                properties:
                  error:
                    $ref: '#/$defs/ErrorBodyDoc'
                required:
                - error
                $defs:
                  ErrorBodyDoc:
                    type: object
                    properties:
                      code:
                        description: Machine-readable error code (e.g. `unauthorized`, `bad_request`).
                        type:
                        - string
                        - 'null'
                      message:
                        description: Human-readable error description.
                        type: string
                    required:
                    - message
        '402':
          description: Payment required â€” insufficient balance or missing payment proof.
          content:
            application/json:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: ErrorResponseDoc
                description: |-
                  MIRROR: the JSON shape `bitrouter_sdk::error::BitrouterError` serialises into
                  (`{ "error": { "code": ..., "message": ... } }`). Cloud handlers map to
                  this envelope via `BitrouterError::into_response`.
                type: object
                properties:
                  error:
                    $ref: '#/$defs/ErrorBodyDoc'
                required:
                - error
                $defs:
                  ErrorBodyDoc:
                    type: object
                    properties:
                      code:
                        description: Machine-readable error code (e.g. `unauthorized`, `bad_request`).
                        type:
                        - string
                        - 'null'
                      message:
                        description: Human-readable error description.
                        type: string
                    required:
                    - message
        '404':
          description: No route found for the requested model.
          content:
            application/json:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: ErrorResponseDoc
                description: |-
                  MIRROR: the JSON shape `bitrouter_sdk::error::BitrouterError` serialises into
                  (`{ "error": { "code": ..., "message": ... } }`). Cloud handlers map to
                  this envelope via `BitrouterError::into_response`.
                type: object
                properties:
                  error:
                    $ref: '#/$defs/ErrorBodyDoc'
                required:
                - error
                $defs:
                  ErrorBodyDoc:
                    type: object
                    properties:
                      code:
                        description: Machine-readable error code (e.g. `unauthorized`, `bad_request`).
                        type:
                        - string
                        - 'null'
                      message:
                        description: Human-readable error description.
                        type: string
                    required:
                    - message
      security:
      - ApiKeyHeader: []
      - BearerAuth: []
  /v1beta/models/{model_action}:
    post:
      tags:
      - Google Compatible
      summary: Generate content (Google)
      description: |-
        Generates content using the Google Generative Language API format. Drop-in replacement for `generativelanguage.googleapis.com/v1beta`.

        The model id and streaming verb are both encoded in the `model_action` path segment â€” for example `gemini-2.0-flash:generateContent` (synchronous) or `gemini-2.0-flash:streamGenerateContent` (SSE). The cloud injects the model id into the request body before dispatching, so callers can use the same URL convention as Google's own API.
      operationId: googleGenerateContent
      parameters:
      - in: path
        name: model_action
        description: '`{model}:{action}` segment â€” Google encodes both the model id and the streaming verb in one path component. `action` is either `generateContent` (synchronous) or `streamGenerateContent` (SSE). Example: `gemini-2.0-flash:generateContent`.'
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        description: Google Generative Language `:generateContent` request.
        content:
          application/json:
            schema:
              $schema: https://json-schema.org/draft/2020-12/schema
              title: GenerateContentRequest
              description: |-
                Generate Content `generateContent` request body
                (<https://ai.google.dev/api/generate-content>).

                `pub` so downstream crates (notably `bitrouter-cloud`) can derive an
                OpenAPI schema from the canonical wire shape without redeclaring it.
              type: object
              properties:
                contents:
                  type: array
                  items:
                    $ref: '#/$defs/GenerateContentContent'
                generationConfig:
                  anyOf:
                  - $ref: '#/$defs/GenerateContentGenerationConfig'
                  - type: 'null'
                model:
                  description: |-
                    Carried as a field so the inbound HTTP route's `{model}` path param can
                    override it; defaults empty.
                  type: string
                  default: ''
                stream:
                  description: |-
                    Injected by `server::generate_content` from the path verb
                    (`:streamGenerateContent` â†’ true, `:generateContent` â†’ false).
                  type: boolean
                  default: false
                systemInstruction:
                  anyOf:
                  - $ref: '#/$defs/GenerateContentContent'
                  - type: 'null'
                tools:
                  type: array
                  items:
                    $ref: '#/$defs/GenerateContentTool'
              required:
              - contents
              $defs:
                GenerateContentContent:
                  description: |-
                    One element of [`GenerateContentRequest`]'s `contents` array â€” a turn
                    carrying optional role + `parts[]`.
                  type: object
                  properties:
                    parts:
                      type: array
                      default: []
                      items: true
                    role:
                      type:
                      - string
                      - 'null'
                      default: null
                GenerateContentFunctionDecl:
                  description: |-
                    One function declaration inside a [`GenerateContentTool`]: name + description +
                    JSON-Schema parameters.
                  type: object
                  properties:
                    description:
                      type:
                      - string
                      - 'null'
                      default: null
                    name:
                      type: string
                    parameters:
                      default: null
                  required:
                  - name
                GenerateContentGenerationConfig:
                  description: '`generationConfig` knobs on a [`GenerateContentRequest`].'
                  type: object
                  properties:
                    frequencyPenalty:
                      description: |-
                        Frequency penalty. Promoted to the canonical `frequency_penalty` slot.
                        <https://ai.google.dev/api/generate-content#GenerationConfig>
                      type:
                      - number
                      - 'null'
                      format: double
                      default: null
                    maxOutputTokens:
                      type:
                      - integer
                      - 'null'
                      format: uint32
                      default: null
                      minimum: 0
                    presencePenalty:
                      description: |-
                        Presence penalty. Promoted to the canonical `presence_penalty` slot.
                        <https://ai.google.dev/api/generate-content#GenerationConfig>
                      type:
                      - number
                      - 'null'
                      format: double
                      default: null
                    responseMimeType:
                      description: |-
                        Response MIME type. `application/json` paired with `response_schema` is
                        the structured-output contract; other values (e.g. `text/x.enum`) pass
                        through opaquely.
                        <https://ai.google.dev/gemini-api/docs/structured-output>
                      type:
                      - string
                      - 'null'
                      default: null
                    responseSchema:
                      description: |-
                        JSON Schema constraining the response (with
                        `response_mime_type: "application/json"`).
                      default: null
                    seed:
                      description: |-
                        Deterministic-sampling seed. Promoted to the canonical `seed` slot.
                        <https://ai.google.dev/api/generate-content#GenerationConfig>
                      type:
                      - integer
                      - 'null'
                      format: int64
                      default: null
                    stopSequences:
                      description: |-
                        Stop sequences. Promoted to the canonical `stop` slot, so it can render
                        as a Chat Completions `stop` or an Anthropic `stop_sequences`.
                        <https://ai.google.dev/api/generate-content#GenerationConfig>
                      type:
                      - array
                      - 'null'
                      default: null
                      items:
                        type: string
                    temperature:
                      type:
                      - number
                      - 'null'
                      format: double
                      default: null
                    topK:
                      description: |-
                        Top-k sampling. Promoted to the canonical `top_k` slot so it translates
                        across protocols (e.g. to an Anthropic upstream's `top_k`).
                        <https://ai.google.dev/api/generate-content#GenerationConfig>
                      type:
                      - integer
                      - 'null'
                      format: uint32
                      default: null
                      minimum: 0
                    topP:
                      type:
                      - number
                      - 'null'
                      format: double
                      default: null
                GenerateContentTool:
                  description: |-
                    One element of [`GenerateContentRequest`]'s `tools` array.

                    A single Google tool object may carry client function declarations
                    (`functionDeclarations`) **and/or** one or more provider-defined ("built-in")
                    tool keys on the same object â€” `googleSearch`, `codeExecution`,
                    `googleSearchRetrieval`, `urlContext`. Function declarations parse to
                    [`Tool::Function`]; every other key is a provider-defined tool namespaced
                    `google.<key>`, its value preserved verbatim as `args`. The non-function keys
                    ride in `extra`.
                    <https://ai.google.dev/gemini-api/docs/function-calling>
                    <https://ai.google.dev/gemini-api/docs/google-search>
                    <https://ai.google.dev/gemini-api/docs/code-execution>
                  type: object
                  properties:
                    functionDeclarations:
                      type: array
                      items:
                        $ref: '#/$defs/GenerateContentFunctionDecl'
        required: true
      responses:
        '200':
          description: |-
            Generated content (non-streaming).

            Streamed generation â€” Server-Sent Events, one JSON object per `data:` line. Use the `:streamGenerateContent` action to opt in.
          content:
            application/json:
              schema:
                description: Google Generative Language response envelope. Refer to Google's published spec for the full field set; bitrouter forwards the upstream body unchanged.
                type: object
            text/event-stream:
              schema:
                description: A single Google streaming chunk.
                type: object
        '400':
          description: Bad request â€” invalid model or malformed request body.
          content:
            application/json:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: ErrorResponseDoc
                description: |-
                  MIRROR: the JSON shape `bitrouter_sdk::error::BitrouterError` serialises into
                  (`{ "error": { "code": ..., "message": ... } }`). Cloud handlers map to
                  this envelope via `BitrouterError::into_response`.
                type: object
                properties:
                  error:
                    $ref: '#/$defs/ErrorBodyDoc'
                required:
                - error
                $defs:
                  ErrorBodyDoc:
                    type: object
                    properties:
                      code:
                        description: Machine-readable error code (e.g. `unauthorized`, `bad_request`).
                        type:
                        - string
                        - 'null'
                      message:
                        description: Human-readable error description.
                        type: string
                    required:
                    - message
        '402':
          description: Payment required â€” insufficient balance or missing payment proof.
          content:
            application/json:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: ErrorResponseDoc
                description: |-
                  MIRROR: the JSON shape `bitrouter_sdk::error::BitrouterError` serialises into
                  (`{ "error": { "code": ..., "message": ... } }`). Cloud handlers map to
                  this envelope via `BitrouterError::into_response`.
                type: object
                properties:
                  error:
                    $ref: '#/$defs/ErrorBodyDoc'
                required:
                - error
                $defs:
                  ErrorBodyDoc:
                    type: object
                    properties:
                      code:
                        description: Machine-readable error code (e.g. `unauthorized`, `bad_request`).
                        type:
                        - string
                        - 'null'
                      message:
                        description: Human-readable error description.
                        type: string
                    required:
                    - message
        '404':
          description: No route found for the requested model.
          content:
            application/json:
              schema:
                $schema: https://json-schema.org/draft/2020-12/schema
                title: ErrorResponseDoc
                description: |-
                  MIRROR: the JSON shape `bitrouter_sdk::error::BitrouterError` serialises into
                  (`{ "error": { "code": ..., "message": ... } }`). Cloud handlers map to
                  this envelope via `BitrouterError::into_response`.
                type: object
                properties:
                  error:
                    $ref: '#/$defs/ErrorBodyDoc'
                required:
                - error
                $defs:
                  ErrorBodyDoc:
                    type: object
                    properties:
                      code:
                        description: Machine-readable error code (e.g. `unauthorized`, `bad_request`).
                        type:
                        - string
                        - 'null'
                      message:
                        description: Human-readable error description.
                        type: string
                    required:
                    - message
      security:
      - ApiKeyHeader: []
      - BearerAuth: []
components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
      description: Anthropic-style API key header.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key or JWT
      description: '`Authorization: Bearer <token>` where `<token>` is either an API key issued by the BitRouter console or a JWT minted from a wallet (CAIP-10 issuer).'
tags:
- name: OpenAI Compatible
  description: OpenAI Chat Completions format. Drop-in compatible with the OpenAI Chat Completions API â€” accepts the same request schema and returns the same response format.
- name: OpenAI Responses
  description: OpenAI Responses API format. Newer stateful-conversation surface; distinct request/response shape from `/v1/chat/completions`.
- name: Anthropic Compatible
  description: Anthropic-format endpoints. Drop-in compatible with the Anthropic Messages API.
- name: Google Compatible
  description: Google Generative Language API format. The URL encodes the model and streaming verb in a single segment (`models/{model}:generateContent` or `:streamGenerateContent`) â€” same convention as Google's own API.
- name: Discovery
  description: Public read-only endpoints for inspecting the router's configuration â€” what models and providers it knows about.
- name: BYOK
  description: Bring-Your-Own-Key endpoints. Returns the node's sealed-box public key so the console can encrypt provider keys client-side; the node never sees plaintext on the write path.
- name: Observability
  description: Operational metrics for scrapers. Not intended for human callers â€” Prometheus-format text exposition.
- name: Health
  description: Liveness check.
- name: Management
  description: Account-bound management endpoints â€” API keys, usage, billing, policies, BYOK provider keys, OAuth clients. Every endpoint requires a credential whose principal carries the per-endpoint scope (e.g. `keys:read`, `billing:write`).

