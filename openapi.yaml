                  default: null
                stream:
                  type: boolean
                  default: false
                temperature:
                  type:
                  - number
                  - 'null'
                  format: double
                  default: null
                tools:
                  type: array
                  items:
                    $ref: '#/$defs/ChatTool'
                top_p:
                  type:
                  - number
                  - 'null'
                  format: double
                  default: null
              required:
              - model
              - messages
              $defs:
                ChatFunctionCall:
