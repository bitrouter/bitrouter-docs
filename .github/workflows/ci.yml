name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          # sync-docs.mjs pulls docs from bitrouter/bitrouter via the GitHub API;
          # without a token the anonymous 60 req/hr per-IP limit (shared across
          # Actions runners) returns 403. The token lifts it to 5,000/hr.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
