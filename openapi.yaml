                (<https://platform.openai.com/docs/api-reference/responses/create>).

                `pub` so downstream crates (notably `bitrouter-cloud`) can derive an
                OpenAPI schema from the canonical wire shape without redeclaring it.

                `input` stays `serde_json::Value` on purpose â€” the Responses API accepts
                either a plain string or a heterogeneous item array (Codex multi-turn,
                #454-3), and the deeper walk happens in `parse_input` (private). Mirrors
                how Anthropic's `system` / `content` are typed.
              type: object
              properties:
                input: true
                instructions:
                  type:
                  - string
                  - 'null'
                  default: null
                max_output_tokens:
                  type:
                  - integer
                  - 'null'
                  format: uint32
                  default: null
                  minimum: 0
                model:
                  type: string
                  default: ''
                reasoning:
                  anyOf:
                  - $ref: '#/$defs/ResponsesReasoningConfig'
                  - type: 'null'
                stream:
                  type: boolean
                  default: false
                temperature:
                  type:
                  - number
                  - 'null'
                  format: double
                  default: null
                text:
                  description: |-
