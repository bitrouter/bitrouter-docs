                      type:
                      - string
                      - 'null'
                    name:
                      description: Schema name (OpenAI requires it).
                      type: string
                    schema:
                      description: The JSON Schema.
                    strict:
                      description: Strict-mode flag.
                      type:
                      - boolean
                      - 'null'
                  required:
                  - name
                  - schema
                ChatMessage:
                  description: |-
                    One element of [`ChatRequest`]'s `messages` array â€” a chat turn carrying
                    role + optional content + optional tool calls / tool-call reply id.
                  type: object
                  properties:
                    content:
                      description: |-
                        `content` may be a plain string or an array of content parts, or absent
                        (an assistant turn that is purely `tool_calls`).
                      default: null
                    reasoning_content:
                      description: |-
                        Reasoning content â€” **not** in OpenAI's Chat Completions spec; this is
                        a vendor extension used by DeepSeek
                        (<https://api-docs.deepseek.com/api/create-chat-completion>), Moonshot
                        (Kimi), Qwen, and other OpenAI-compatible providers that expose the
