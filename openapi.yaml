  /v1/chat/completions:
    post:
      tags:
      - OpenAI Compatible
      summary: Create chat completion
      description: |-
        Creates a chat completion for the given messages. Drop-in replacement for the OpenAI Chat Completions API â€” accepts the same request schema and returns the same response format, including `usage` with token counts.

        The router resolves the requested model to an upstream provider, forwards the request, and returns the response. Supports both synchronous and streaming modes.

        When `stream: true`, the response is sent as Server-Sent Events (SSE) where each `data` line contains a `ChatCompletionChunk` JSON object. The stream ends with `data: [DONE]`.
      operationId: createChatCompletion
      requestBody:
        description: Chat completion request. The router forwards a slightly enriched version of this body to the resolved upstream provider.
        content:
          application/json:
            schema:
              $schema: https://json-schema.org/draft/2020-12/schema
              title: ChatRequest
              description: |-
                Chat Completions request body
                (<https://platform.openai.com/docs/api-reference/chat/create>).

                `pub` so downstream crates (notably `bitrouter-cloud`) can derive an
                OpenAPI schema from the canonical wire shape without redeclaring it.
              type: object
              properties:
                frequency_penalty:
                  description: |-
                    Frequency penalty. Promoted to the canonical `frequency_penalty` slot.
                    <https://platform.openai.com/docs/api-reference/chat/create#chat-create-frequency_penalty>
                  type:
                  - number
                  - 'null'
                  format: double
                  default: null
                max_completion_tokens:
                  type:
                  - integer
                  - 'null'
                  format: uint32
                  default: null
                  minimum: 0
                max_tokens:
                  type:
                  - integer
                  - 'null'
                  format: uint32
                  default: null
                  minimum: 0
                messages:
                  type: array
                  items:
                    $ref: '#/$defs/ChatMessage'
                model:
                  type: string
                presence_penalty:
                  description: |-
                    Presence penalty. Promoted to the canonical `presence_penalty` slot.
                    <https://platform.openai.com/docs/api-reference/chat/create#chat-create-presence_penalty>
                  type:
                  - number
                  - 'null'
                  format: double
                  default: null
                reasoning_effort:
                  type:
                  - string
                  - 'null'
                  default: null
                response_format:
                  description: |-
                    Output-format constraint. The `json_schema` variant is the
                    structured-output contract; `json_object` is the legacy JSON mode and
                    `text` is the default. Promoted to the canonical `response_format` slot
                    at parse time (`json_object` / `text` pass through opaquely).
                    <https://platform.openai.com/docs/guides/structured-outputs>
